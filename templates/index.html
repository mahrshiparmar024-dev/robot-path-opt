<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robot Path Optimization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.28.0.min.js"></script>
</head>
<body>
    <div class="page">
        <header>
            <h1>Robot Path Optimization</h1>
            <p>Interactive gradient-based path planning for a robot navigating around obstacles.</p>
        </header>

        <section class="controls">
            <button id="runButton">Run Simulation</button>
            <span id="status">Press the button to load the simulation.</span>
        </section>

        <section id="plot" class="plot"></section>

        <section class="metrics">
            <h2>Simulation Metrics</h2>
            <pre id="metrics">Results will appear here after loading the simulation.</pre>
        </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
